<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>程式基礎練習系統</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header p {
            color: #666;
            font-size: 16px;
            letter-spacing: 1px;
        }
        
        .menu-list {
            list-style: none;
        }
        
        .menu-item {
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }
        
        .menu-item:hover {
            transform: translateX(10px);
        }
        
        .menu-item a {
            display: flex;
            align-items: center;
            padding: 20px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }
        
        .menu-item a::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            margin-right: 15px;
        }
        
        .menu-item a:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .menu-item:nth-child(2) a {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.2);
        }
        
        .menu-item:nth-child(2) a:hover {
            box-shadow: 0 10px 25px rgba(245, 87, 108, 0.4);
        }
        
        .menu-item:nth-child(3) a {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.2);
        }
        
        .menu-item:nth-child(3) a:hover {
            box-shadow: 0 10px 25px rgba(79, 172, 254, 0.4);
        }
        
        .menu-item:nth-child(4) a {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            box-shadow: 0 5px 15px rgba(67, 233, 123, 0.2);
        }
        
        .menu-item:nth-child(4) a:hover {
            box-shadow: 0 10px 25px rgba(67, 233, 123, 0.4);
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 14px;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 40px 25px;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .menu-item a {
                font-size: 16px;
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 程式基礎練習系統</h1>
            <p>探索 PHP 程式設計的基礎概念</p>
        </div>
        
        <ul class="menu-list">
            <li class="menu-item">
                <a href="01-basic.php">✨ 程式基礎概念</a>
            </li>
            <li class="menu-item">
                <a href="02-select.php">🔀 流程控制</a>
            </li>
            <li class="menu-item">
                <a href="03-forloop.php">🔁 循環結構</a>
            </li>
            <li class="menu-item">
                <a href="04-practice.php">🎯 綜合練習</a>
            </li>
        </ul>
        
        <div class="footer">
            <p>💡 選擇一個課題開始學習</p>
        </div>
    </div>
</body>
</html>
